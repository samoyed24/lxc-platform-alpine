# Per-user configuration example (Debian).
#
# Important:
# 1) Rename this file to match your user id, for example user-a.yaml.
# 2) Use plain lowercase keys (no C_<ID>_ prefix needed).

# Container name under /var/lib/lxc.
name: "user-a"

# Route name used by sshpiper route directory.
route: "user-a"

# Backend key rotation trigger.
# Change this value (for example v1 -> v2) and run apply to rotate host->container backend key.
backend_key_version: "v1"

# Desired state:
# - true: container should exist/running (apply creates/starts)
# - false: container should be stopped
enabled: "true"

# Rootfs image size, for example 4G, 10G.
disk: "6G"

# Memory limit written to lxc cgroup config, for example 96M, 512M.
memory: "512M"

# CPU field reserved by config/state (not actively enforced yet by current script).
cpu: "1"

# Distro for lxc-download template, for example alpine, debian, ubuntu.
distro: "debian"

# Distro release, for example 3.23, bookworm, jammy.
release: "bookworm"

# Container architecture, for example amd64, arm64.
arch: "amd64"

# Optional fixed IPv6 address.
# Use "auto" or omit to auto-assign from prefix.
ipv6: "auto"

# Host SSH proxy port (10.10.0.1:<port> -> container:22).
ssh_port: "22022"

# Host-to-container port mappings.
# You can use list style (recommended) or a single space-separated string.
ports:
  - "8080:80"
  - "8443:443"

# SNI mappings used by sniproxy: "hostname:host_port".
# host_port should match a port published in ports.
sni:
  - "app.example.com:8443"

# SSH public keys map.
# Preferred style: key name -> public key.
keys:
  admin: "ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAA... admin@example"
  ops: "ssh-rsa AAAAB3NzaC1yc2EAAAADAQABAAABAQ... ops@example"
